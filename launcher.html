<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="application-name" content="Monkey Mart Launcher">
    
    <!-- Open Graph -->
    <meta property="og:title" content="Monkey Mart Launcher">
    <meta property="og:image" content="https://play-lh.googleusercontent.com/Yqx6iSJYfrEdTTUQXz8uhX9e05duBrbuupvC-Jsdg7FffNc5nu3tzLc0Bi0i2cxugnNXWUTgzCzdqhEcztgBCQ=w240-h480-rw">
    <meta property="og:type" content="website">
    
    <!-- Apple WebKit -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Monkey Mart">
    <link rel="apple-touch-icon" href="https://play-lh.googleusercontent.com/Yqx6iSJYfrEdTTUQXz8uhX9e05duBrbuupvC-Jsdg7FffNc5nu3tzLc0Bi0i2cxugnNXWUTgzCzdqhEcztgBCQ=w240-h480-rw">

    <title>Monkey Mart Launcher</title>
    <link rel="icon" type="image/png" href="https://play-lh.googleusercontent.com/Yqx6iSJYfrEdTTUQXz8uhX9e05duBrbuupvC-Jsdg7FffNc5nu3tzLc0Bi0i2cxugnNXWUTgzCzdqhEcztgBCQ=w240-h480-rw"/>


    
    <!-- Google Fonts for a playful, bouncy aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #7cb342; /* Grass green */
            --bg-gradient: radial-gradient(circle at top, #aed581, #7cb342);
            --card-bg: #fffde7;
            --text-dark: #3e2723;
            --border-color: #5d4037;
            
            /* Bubble Button Colors */
            --btn-green: #4caf50;
            --btn-green-shadow: #2e7d32;
            --btn-yellow: #ffeb3b;
            --btn-yellow-shadow: #fbc02d;
            --btn-red: #f44336;
            --btn-red-shadow: #c62828;
            --btn-blue: #29b6f6;
            --btn-blue-shadow: #0277bd;
            --btn-orange: #ff9800;
            --btn-orange-shadow: #ef6c00;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-gradient);
            font-family: 'Fredoka', sans-serif;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            text-align: center;
            background-color: rgba(255, 255, 255, 0.2);
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 10;
        }

        header h1 {
            margin: 0;
            font-size: 2.2rem;
            color: #fff;
            text-shadow: 2px 2px 0 var(--text-dark), -2px -2px 0 var(--text-dark), 2px -2px 0 var(--text-dark), -2px 2px 0 var(--text-dark);
            letter-spacing: 2px;
            animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #save-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .save-card {
            background-color: var(--card-bg);
            border: 4px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 8px 0 rgba(93, 64, 55, 0.2);
            transition: all 0.3s ease;
            position: relative;
            animation: popIn 0.5s ease backwards;
        }

        .save-card:hover {
            transform: translateY(-3px);
        }

        /* Highlight Selected Save */
        .save-card.selected {
            border-color: #ff9800;
            box-shadow: 0 0 20px rgba(255, 152, 0, 0.6), 0 8px 0 #ef6c00;
            transform: scale(1.02);
            background-color: #fff8e1;
        }

        .save-card h2 {
            margin: 0 0 5px 0;
            color: var(--btn-green-shadow);
        }

        .save-card p {
            margin: 0 0 15px 0;
            font-size: 1.1rem;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        /* Bubble Buttons */
        button {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            padding: 10px 15px;
            border-radius: 25px;
            border: 3px solid var(--border-color);
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.1s, box-shadow 0.1s;
            color: var(--text-dark);
        }

        button:active {
            transform: translateY(4px);
            box-shadow: none !important;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none !important;
        }

        .btn-select { background: var(--btn-green); box-shadow: 0 4px 0 var(--btn-green-shadow); color: white; text-shadow: 1px 1px 0 #000; }
        .btn-edit { background: var(--btn-blue); box-shadow: 0 4px 0 var(--btn-blue-shadow); color: white; text-shadow: 1px 1px 0 #000; }
        .btn-overwrite { background: var(--btn-orange); box-shadow: 0 4px 0 var(--btn-orange-shadow); color: white; text-shadow: 1px 1px 0 #000; }
        .btn-delete { background: var(--btn-red); box-shadow: 0 4px 0 var(--btn-red-shadow); color: white; text-shadow: 1px 1px 0 #000; }
        
        footer {
            background-color: var(--border-color);
            padding: 15px 20px;
            display: flex;
            justify-content: space-around;
            z-index: 10;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.2);
        }

        .btn-add { background: var(--btn-yellow); box-shadow: 0 4px 0 var(--btn-yellow-shadow); font-size: 1.2rem; padding: 15px 30px;}
        .btn-play { background: var(--btn-green); box-shadow: 0 4px 0 var(--btn-green-shadow); color: white; font-size: 1.2rem; padding: 15px 30px;}

        /* Pulse Animation for Play Button */
        .btn-play.pulse {
            animation: pulse-anim 1.5s infinite;
        }

        /* Modals & Overlays */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(3px);
        }

        #modal-overlay.visible {
            display: flex;
            animation: fadeIn 0.3s;
        }

        .custom-modal {
            display: none;
            background: var(--card-bg);
            border: 5px solid var(--border-color);
            border-radius: 20px;
            padding: 25px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 0 rgba(0,0,0,0.3);
            text-align: center;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-height: 85vh;
            overflow-y: auto;
        }

        .custom-modal.active {
            display: block;
        }

        .custom-modal h2 {
            margin-top: 0;
            color: var(--btn-orange-shadow);
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .modal-input {
            font-family: 'Fredoka', sans-serif;
            padding: 12px;
            border-radius: 12px;
            border: 3px solid #ccc;
            font-size: 1.1rem;
            margin-bottom: 15px;
            width: 90%;
        }

        .modal-input:focus {
            outline: none;
            border-color: var(--btn-blue);
        }

        .modal-buttons {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        .timer-text {
            font-size: 1.5rem;
            color: var(--btn-red-shadow);
            font-weight: 700;
            margin: 10px 0;
            animation: bounceIn 0.5s infinite alternate;
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { 
            0% { transform: scale(0.7); opacity: 0; } 
            100% { transform: scale(1); opacity: 1; } 
        }
        @keyframes bounceIn {
            0% { transform: scale(0.9); }
            100% { transform: scale(1.1); }
        }
        @keyframes pulse-anim {
            0% { transform: scale(1); box-shadow: 0 4px 0 var(--btn-green-shadow); }
            50% { transform: scale(1.08); box-shadow: 0 8px 15px var(--btn-green-shadow); background: #66bb6a; }
            100% { transform: scale(1); box-shadow: 0 4px 0 var(--btn-green-shadow); }
        }

        @media (max-width: 600px) {
            .button-group { justify-content: center; }
            footer { flex-direction: column; gap: 15px; }
            .btn-add, .btn-play { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Monkey Mart Launcher</h1>
    </header>

    <main id="save-list">
        <!-- Save cards will be injected here -->
        <h3 style="color: white; text-align: center;">Contacting monkeys...</h3>
    </main>

    <footer>
        <button id="add-save-btn" class="btn-add">ADD NEW SAVE</button>
        <button id="play-btn" class="btn-play">PLAY GAME</button>
    </footer>

    <!-- Universal Modal Overlay -->
    <div id="modal-overlay">

        <!-- 1. Generic Alert / Confirm Modal -->
        <div id="msg-modal" class="custom-modal">
            <h2 id="msg-title">Notice</h2>
            <p id="msg-desc" style="font-size: 1.1rem;"></p>
            <div class="modal-buttons">
                <button id="msg-btn-no" class="btn-delete">No</button>
                <button id="msg-btn-yes" class="btn-select">Yes</button>
            </div>
        </div>

        <!-- 2. Add Save Prompt Modal -->
        <div id="add-modal" class="custom-modal">
            <h2>Add New Save</h2>
            <p>Save your current progress to the cloud!</p>
            <input type="text" id="add-name" class="modal-input" placeholder="Save Name (e.g. Max Cash)">
            <input type="text" id="add-desc" class="modal-input" placeholder="Short Description">
            <div class="modal-buttons">
                <button id="add-btn-cancel" class="btn-delete">Cancel</button>
                <button id="add-btn-save" class="btn-select">Save to Cloud</button>
            </div>
        </div>

        <!-- 3. Danger Countdown Modal (Delete / Clear) -->
        <div id="danger-modal" class="custom-modal">
            <h2 id="danger-title">Danger!</h2>
            <p id="danger-desc" style="font-size: 1.1rem;"></p>
            <input type="text" id="danger-input" class="modal-input" placeholder="Type here..." autocomplete="off">
            <div id="danger-timer-container" style="display: none;">
                <p>Action executing in:</p>
                <div id="danger-timer" class="timer-text">10</div>
            </div>
            <div class="modal-buttons">
                <button id="danger-btn-cancel" class="btn-select">Cancel</button>
                <button id="danger-btn-verify" class="btn-delete" disabled>Verify</button>
            </div>
        </div>

        <!-- 4. Edit Save Modal -->
        <div id="edit-modal" class="custom-modal">
            <h2>Edit Save Data</h2>
            <div class="form-group"><label>Coins</label><input type="number" id="edit-coins" class="modal-input" style="padding: 8px; margin-bottom: 0;"></div>
            <div class="form-group"><label>Cash</label><input type="number" id="edit-cash" class="modal-input" style="padding: 8px; margin-bottom: 0;"></div>
            <div class="form-group"><label>Cash 2</label><input type="number" id="edit-cash2" class="modal-input" style="padding: 8px; margin-bottom: 0;"></div>
            <div class="form-group"><label>Cash 3</label><input type="number" id="edit-cash3" class="modal-input" style="padding: 8px; margin-bottom: 0;"></div>
            <div class="form-group"><label>Cash 4</label><input type="number" id="edit-cash4" class="modal-input" style="padding: 8px; margin-bottom: 0;"></div>
            <div class="form-group"><label>Num Market</label><input type="number" id="edit-num-market" class="modal-input" style="padding: 8px; margin-bottom: 0;"></div>
            <div class="form-group"><label>Selected Hat</label><input type="number" id="edit-hat" class="modal-input" style="padding: 8px; margin-bottom: 0;"></div>
            <div class="form-group"><label>Upgrades (JSON Array)</label><textarea id="edit-upgrades" class="modal-input" style="padding: 8px; height: 50px; margin-bottom: 0;"></textarea></div>
            <div class="form-group"><label>Have Places (JSON Array)</label><textarea id="edit-have-places" class="modal-input" style="padding: 8px; height: 50px; margin-bottom: 0;"></textarea></div>
            
            <div class="modal-buttons">
                <button id="cancel-edit-btn" class="btn-delete">Cancel</button>
                <button id="save-edit-btn" class="btn-select">Save Changes</button>
            </div>
        </div>

    </div>

    <!-- Firebase SDK (v10 Module) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, update, remove } 
            from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Firebase Configuration
        const firebaseConfig = {
            databaseURL: "https://jellyfish-jelly-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const savesRef = ref(db, 'monkey-mart');

        const LOCAL_KEY = 'monkeymart_config';
        let savesCache = {};
        let selectedSaveId = null; 
        let currentEditId = null;

        // Modal Management
        const modalOverlay = document.getElementById('modal-overlay');
        const modals = document.querySelectorAll('.custom-modal');

        function openModal(modalId) {
            modals.forEach(m => m.classList.remove('active'));
            document.getElementById(modalId).classList.add('active');
            modalOverlay.classList.add('visible');
        }

        function closeModal() {
            modalOverlay.classList.remove('visible');
            modals.forEach(m => m.classList.remove('active'));
        }

        // Custom Alert & Confirm
        function showAlert(message) {
            document.getElementById('msg-title').innerText = "Notice";
            document.getElementById('msg-desc').innerText = message;
            document.getElementById('msg-btn-yes').innerText = "OK";
            document.getElementById('msg-btn-yes').onclick = closeModal;
            document.getElementById('msg-btn-no').style.display = "none";
            openModal('msg-modal');
        }

        function showConfirm(title, message, onConfirm) {
            document.getElementById('msg-title').innerText = title;
            document.getElementById('msg-desc').innerText = message;
            document.getElementById('msg-btn-yes').innerText = "Yes";
            document.getElementById('msg-btn-no').style.display = "block";
            
            document.getElementById('msg-btn-yes').onclick = () => {
                closeModal();
                if(onConfirm) onConfirm();
            };
            document.getElementById('msg-btn-no').onclick = closeModal;
            
            openModal('msg-modal');
        }

        // Danger Countdown Logic
        let dangerInterval = null;
        function showDangerCountdown(title, expectedText, onTimerEnd) {
            const descEl = document.getElementById('danger-desc');
            const inputEl = document.getElementById('danger-input');
            const verifyBtn = document.getElementById('danger-btn-verify');
            const cancelBtn = document.getElementById('danger-btn-cancel');
            const timerContainer = document.getElementById('danger-timer-container');
            const timerEl = document.getElementById('danger-timer');

            // Reset State
            if(dangerInterval) clearInterval(dangerInterval);
            inputEl.style.display = 'block';
            inputEl.value = '';
            verifyBtn.style.display = 'block';
            verifyBtn.disabled = true;
            timerContainer.style.display = 'none';

            document.getElementById('danger-title').innerText = title;
            descEl.innerHTML = `Type <strong>"${expectedText}"</strong> to proceed.`;

            inputEl.oninput = () => {
                verifyBtn.disabled = (inputEl.value !== expectedText);
            };

            verifyBtn.onclick = () => {
                inputEl.style.display = 'none';
                verifyBtn.style.display = 'none';
                timerContainer.style.display = 'block';
                
                let timeLeft = 10;
                timerEl.innerText = timeLeft;

                dangerInterval = setInterval(() => {
                    timeLeft--;
                    timerEl.innerText = timeLeft;
                    if(timeLeft <= 0) {
                        clearInterval(dangerInterval);
                        closeModal();
                        if(onTimerEnd) onTimerEnd();
                    }
                }, 1000);
            };

            cancelBtn.onclick = () => {
                if(dangerInterval) clearInterval(dangerInterval);
                closeModal();
            };

            openModal('danger-modal');
        }


        // DOM Elements
        const saveListEl = document.getElementById('save-list');
        const playBtn = document.getElementById('play-btn');

        // Fetch and Render Saves
        onValue(savesRef, (snapshot) => {
            saveListEl.innerHTML = '';
            savesCache = {};

            if (!snapshot.exists()) {
                saveListEl.innerHTML = '<h3 style="color: white; text-align: center;">No saves found. Be the first to add one!</h3>';
                return;
            }

            const data = snapshot.val();
            let delay = 0;
            
            for (const [id, save] of Object.entries(data)) {
                savesCache[id] = save;
                const card = document.createElement('div');
                card.className = `save-card ${selectedSaveId === id ? 'selected' : ''}`;
                card.id = `card-${id}`;
                card.style.animationDelay = `${delay}s`;
                delay += 0.05;

                card.innerHTML = `
                    <h2>${escapeHTML(save.name || 'Unnamed Save')}</h2>
                    <p>${escapeHTML(save.description || 'No description provided.')}</p>
                    <div class="button-group">
                        <button class="btn-select" data-id="${id}">Select Save</button>
                        <button class="btn-edit" data-id="${id}">Edit</button>
                        <button class="btn-overwrite" data-id="${id}">Overwrite</button>
                        <button class="btn-delete" data-id="${id}">Delete</button>
                    </div>
                `;
                saveListEl.appendChild(card);
            }
        });

        // Event Delegation for Save Cards
        saveListEl.addEventListener('click', (e) => {
            const btn = e.target;
            if (!btn.dataset.id) return;
            const id = btn.dataset.id;

            if (btn.classList.contains('btn-select')) selectSave(id);
            else if (btn.classList.contains('btn-edit')) openEditModal(id);
            else if (btn.classList.contains('btn-overwrite')) overwriteSave(id);
            else if (btn.classList.contains('btn-delete')) deleteSave(id);
        });

        // 1. ADD SAVE
        document.getElementById('add-save-btn').addEventListener('click', () => {
            const localData = localStorage.getItem(LOCAL_KEY);
            if (!localData) {
                showAlert("No local monkeymart_config found! Play the game first to create a save.");
                return;
            }
            
            document.getElementById('add-name').value = '';
            document.getElementById('add-desc').value = '';
            openModal('add-modal');

            document.getElementById('add-btn-save').onclick = () => {
                const name = document.getElementById('add-name').value.trim();
                const desc = document.getElementById('add-desc').value.trim();
                
                if (!name) {
                    showAlert("Save Name is required!");
                    return;
                }

                push(savesRef, {
                    name: name,
                    description: desc,
                    saveData: localData
                }).then(() => {
                    closeModal();
                    showAlert("Save added successfully to the cloud!");
                }).catch(err => {
                    showAlert("Error adding save: " + err.message);
                });
            };

            document.getElementById('add-btn-cancel').onclick = closeModal;
        });

        // 2. SELECT SAVE
        function selectSave(id) {
            selectedSaveId = id;
            
            // UI Updates
            document.querySelectorAll('.save-card').forEach(card => card.classList.remove('selected'));
            document.getElementById(`card-${id}`).classList.add('selected');
            
            // Pulse the play button
            playBtn.classList.add('pulse');
        }

        // 3. OVERWRITE SAVE
        function overwriteSave(id) {
            const save = savesCache[id];
            const localData = localStorage.getItem(LOCAL_KEY);
            
            if (!localData) {
                showAlert("No local save found to overwrite with!");
                return;
            }

            showConfirm(
                "Overwrite Cloud Save?",
                `Are you sure you want to overwrite "${save.name}" with your CURRENT local progress?`,
                () => {
                    update(ref(db, `monkey-mart/${id}`), { saveData: localData }).then(() => {
                        showAlert("Cloud save overwritten successfully!");
                    });
                }
            );
        }

        // 4. DELETE SAVE (With Countdown)
        function deleteSave(id) {
            const save = savesCache[id];
            showDangerCountdown("Delete Save", save.name, () => {
                remove(ref(db, `monkey-mart/${id}`)).then(() => {
                    if (selectedSaveId === id) {
                        selectedSaveId = null;
                        playBtn.classList.remove('pulse');
                    }
                    showAlert(`Save "${save.name}" has been deleted.`);
                });
            });
        }

        // 5. PLAY GAME
        playBtn.addEventListener('click', () => {
            if (selectedSaveId) {
                // Apply the save & Play
                const save = savesCache[selectedSaveId];
                if (save && save.saveData) {
                    localStorage.setItem(LOCAL_KEY, save.saveData);
                    window.location.href = 'game.html';
                } else {
                    showAlert("Error loading save data.");
                }
            } else {
                // No save selected - Ask to clear all local storage
                showDangerCountdown(
                    "Start Fresh?", 
                    "CLEAR", 
                    () => {
                        localStorage.clear(); // Clears all local storage
                        window.location.href = 'game.html';
                    }
                );
            }
        });

        // --- EDIT MODAL LOGIC ---
        function openEditModal(id) {
            currentEditId = id;
            const save = savesCache[id];
            let parsedData = {};

            try { parsedData = JSON.parse(save.saveData || '{}'); } 
            catch(e) { showAlert("Save data is corrupted. Cannot edit."); return; }

            document.getElementById('edit-coins').value = parsedData.coins || 0;
            document.getElementById('edit-cash').value = parsedData.cash || 0;
            document.getElementById('edit-cash2').value = parsedData.cash2 || 0;
            document.getElementById('edit-cash3').value = parsedData.cash3 || 0;
            document.getElementById('edit-cash4').value = parsedData.cash4 || 0;
            document.getElementById('edit-num-market').value = parsedData.numMarket || 0;
            document.getElementById('edit-hat').value = parsedData.selectedHat || 0;
            document.getElementById('edit-upgrades').value = parsedData.upgrades ? JSON.stringify(parsedData.upgrades) : '[]';
            document.getElementById('edit-have-places').value = parsedData.have_places ? JSON.stringify(parsedData.have_places) : '[]';

            openModal('edit-modal');
        }

        document.getElementById('cancel-edit-btn').addEventListener('click', closeModal);

        document.getElementById('save-edit-btn').addEventListener('click', () => {
            if (!currentEditId) return;
            const save = savesCache[currentEditId];
            let parsedData = {};
            try { parsedData = JSON.parse(save.saveData || '{}'); } catch(e) { parsedData = {}; }

            parsedData.coins = parseFloat(document.getElementById('edit-coins').value) || 0;
            parsedData.cash = parseFloat(document.getElementById('edit-cash').value) || 0;
            parsedData.cash2 = parseFloat(document.getElementById('edit-cash2').value) || 0;
            parsedData.cash3 = parseFloat(document.getElementById('edit-cash3').value) || 0;
            parsedData.cash4 = parseFloat(document.getElementById('edit-cash4').value) || 0;
            parsedData.numMarket = parseInt(document.getElementById('edit-num-market').value) || 0;
            parsedData.selectedHat = parseInt(document.getElementById('edit-hat').value) || 0;

            try {
                parsedData.upgrades = JSON.parse(document.getElementById('edit-upgrades').value);
                parsedData.have_places = JSON.parse(document.getElementById('edit-have-places').value);
            } catch (e) {
                showAlert("Invalid JSON format in Upgrades or Have Places.");
                return;
            }

            update(ref(db, `monkey-mart/${currentEditId}`), {
                saveData: JSON.stringify(parsedData)
            }).then(() => {
                closeModal();
                showAlert("Save data updated successfully!");
                currentEditId = null;
            }).catch(err => {
                showAlert("Error updating save: " + err.message);
            });
        });

        // Helper
        function escapeHTML(str) {
            const div = document.createElement('div');
            div.innerText = str;
            return div.innerHTML;
        }

    </script>
